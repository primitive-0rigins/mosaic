name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest
